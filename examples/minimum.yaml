# Minimum single-host SeaweedFS cluster.
#
# Runs one master, one volume server, and one filer on the same host.
# Good for local experimentation and smoke tests. For anything close to
# production, see examples/typical.yaml.

global:
  dir.conf: "/etc/seaweed"
  dir.data: "/opt/seaweed"
  volumeSizeLimitMB: 5000
  replication: "000"

master_servers:
  - ip: 127.0.0.1
    port: 9333

volume_servers:
  - ip: 127.0.0.1
    port: 8382
    folders:
      - folder: .
        disk: ""

filer_servers:
  - ip: 127.0.0.1
    port: 8888
