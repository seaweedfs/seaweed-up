name: Integration Host Prep

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  host-prep:
    name: Host Prep (ulimits, sysctls, firewall, time sync)
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build seaweed-up binary
        run: go build -v -o seaweed-up .

      - name: Create Docker network
        run: docker network create --driver bridge --subnet 172.28.0.0/16 seaweed-up-net

      - name: Start host container
        run: |
          docker run -d \
            --name seaweed-up-host1 \
            --hostname host1 \
            --privileged \
            --cgroupns=host \
            --network seaweed-up-net \
            --ip 172.28.0.10 \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            geerlingguy/docker-ubuntu2204-ansible:latest

          echo "Waiting for container to start..."
          sleep 10

          status=$(docker inspect -f '{{.State.Status}}' seaweed-up-host1 2>/dev/null || echo "not found")
          if [ "$status" != "running" ]; then
            docker logs seaweed-up-host1 2>&1 || true
            exit 1
          fi

          echo "Waiting for systemd to initialize..."
          for i in {1..60}; do
            state=$(docker exec seaweed-up-host1 systemctl is-system-running 2>/dev/null || echo "starting")
            if [ "$state" = "running" ] || [ "$state" = "degraded" ]; then
              echo "Systemd ready (state: $state)"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Timeout waiting for systemd"
              docker exec seaweed-up-host1 journalctl -xe --no-pager 2>&1 | tail -100 || true
              exit 1
            fi
            sleep 2
          done

      - name: Install SSH on container
        run: |
          docker exec seaweed-up-host1 bash -c "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y openssh-server curl netcat-openbsd iptables"
          docker exec seaweed-up-host1 bash -c "mkdir -p /run/sshd"
          docker exec seaweed-up-host1 bash -c "sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config"
          docker exec seaweed-up-host1 bash -c "sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config"
          docker exec seaweed-up-host1 bash -c "systemctl enable ssh && systemctl start ssh"

          sleep 3
          for j in {1..30}; do
            if nc -z 172.28.0.10 22 2>/dev/null; then
              echo "SSH ready on 172.28.0.10"
              break
            fi
            sleep 1
          done

      - name: Setup SSH keys
        working-directory: test/integration
        run: |
          mkdir -p .ssh
          ssh-keygen -t rsa -b 2048 -f .ssh/id_rsa_test -N "" -q

          PUB_KEY=$(cat .ssh/id_rsa_test.pub)
          docker exec seaweed-up-host1 bash -c "mkdir -p /root/.ssh && chmod 700 /root/.ssh"
          docker exec seaweed-up-host1 bash -c "echo '$PUB_KEY' > /root/.ssh/authorized_keys"
          docker exec seaweed-up-host1 bash -c "chmod 600 /root/.ssh/authorized_keys && chown root:root /root/.ssh/authorized_keys"

      - name: Run cluster prepare (first pass)
        working-directory: test/integration
        run: |
          ../../seaweed-up cluster prepare test-prep \
            -f testdata/cluster-prep.yaml \
            -u root \
            --identity .ssh/id_rsa_test \
            --yes

      - name: Assert host prep artifacts
        run: |
          docker exec seaweed-up-host1 test -f /etc/security/limits.d/seaweed.conf
          docker exec seaweed-up-host1 cat /etc/security/limits.d/seaweed.conf
          docker exec seaweed-up-host1 grep -q "nofile 1048576" /etc/security/limits.d/seaweed.conf
          docker exec seaweed-up-host1 test -f /etc/sysctl.d/99-seaweed.conf
          docker exec seaweed-up-host1 cat /etc/sysctl.d/99-seaweed.conf
          val=$(docker exec seaweed-up-host1 sysctl -n vm.max_map_count)
          echo "vm.max_map_count=$val"
          test "$val" = "262144"

      - name: Run cluster prepare (second pass, idempotency)
        working-directory: test/integration
        run: |
          ../../seaweed-up cluster prepare test-prep \
            -f testdata/cluster-prep.yaml \
            -u root \
            --identity .ssh/id_rsa_test \
            --yes

      - name: Assert host prep still valid after re-run
        run: |
          docker exec seaweed-up-host1 test -f /etc/security/limits.d/seaweed.conf
          docker exec seaweed-up-host1 grep -q "nofile 1048576" /etc/security/limits.d/seaweed.conf
          val=$(docker exec seaweed-up-host1 sysctl -n vm.max_map_count)
          test "$val" = "262144"

      - name: Run Go integration test
        env:
          SEAWEED_UP_EXTERNAL_ENV: "1"
        run: |
          # The Go test framework can start its own docker-compose environment,
          # but we have already provisioned the host container above. Setting
          # SEAWEED_UP_EXTERNAL_ENV=1 tells framework.Setup() to skip the
          # docker-compose path and reuse the externally managed containers.
          go test -tags integration ./test/integration/ -run TestHostPrep -v

      - name: Save logs
        if: always()
        run: |
          echo "=== Container Status ===" > host-prep.log
          docker ps -a >> host-prep.log
          docker logs seaweed-up-host1 >> host-prep.log 2>&1 || true
          docker exec seaweed-up-host1 cat /etc/security/limits.d/seaweed.conf >> host-prep.log 2>&1 || true
          docker exec seaweed-up-host1 cat /etc/sysctl.d/99-seaweed.conf >> host-prep.log 2>&1 || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: host-prep-logs
          path: host-prep.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker stop seaweed-up-host1 || true
          docker rm seaweed-up-host1 || true
          docker network rm seaweed-up-net || true
          rm -rf test/integration/.ssh
