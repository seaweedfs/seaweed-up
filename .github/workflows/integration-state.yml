name: Integration State Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: test/integration

jobs:
  persisted-state-test:
    name: Persisted State Integration Test
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build seaweed-up binary
        working-directory: .
        run: go build -v -o seaweed-up .

      - name: Run persisted state integration test
        run: |
          go test -tags=integration -run TestPersistedStateSingleNode -v -timeout 20m ./...

      - name: Save logs
        if: always()
        run: |
          echo "=== Container Status ===" > state-test.log
          docker ps -a >> state-test.log 2>&1 || true
          for host in seaweed-up-host1 seaweed-up-host2 seaweed-up-host3; do
            echo "=== Logs for $host ===" >> state-test.log
            docker logs $host >> state-test.log 2>&1 || true
          done

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-state-test-logs
          path: test/integration/state-test.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.yml down -v --remove-orphans || true
          rm -rf .ssh
