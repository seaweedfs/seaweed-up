name: Integration Tests (Admin UI)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: test/integration

jobs:
  admin-ui-test:
    name: Admin UI Deployment Test
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build seaweed-up binary
        working-directory: .
        run: go build -v -o seaweed-up .

      - name: Create Docker network
        run: |
          docker network create --driver bridge --subnet 172.28.0.0/16 seaweed-up-net

      - name: Start containers with docker run
        run: |
          docker run -d \
            --name seaweed-up-host1 \
            --hostname host1 \
            --privileged \
            --cgroupns=host \
            --network seaweed-up-net \
            --ip 172.28.0.10 \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            geerlingguy/docker-ubuntu2204-ansible:latest

          docker run -d \
            --name seaweed-up-host2 \
            --hostname host2 \
            --privileged \
            --cgroupns=host \
            --network seaweed-up-net \
            --ip 172.28.0.11 \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            geerlingguy/docker-ubuntu2204-ansible:latest

          docker run -d \
            --name seaweed-up-host3 \
            --hostname host3 \
            --privileged \
            --cgroupns=host \
            --network seaweed-up-net \
            --ip 172.28.0.12 \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            geerlingguy/docker-ubuntu2204-ansible:latest

          echo "Waiting for containers to start..."
          sleep 10
          docker ps -a

          for host in seaweed-up-host1 seaweed-up-host2 seaweed-up-host3; do
            status=$(docker inspect -f '{{.State.Status}}' $host 2>/dev/null || echo "not found")
            echo "Container $host status: $status"
            if [ "$status" != "running" ]; then
              docker logs $host 2>&1 || true
              exit 1
            fi
          done

          echo "Waiting for systemd to initialize..."
          for host in seaweed-up-host1 seaweed-up-host2 seaweed-up-host3; do
            for i in {1..60}; do
              state=$(docker exec $host systemctl is-system-running 2>/dev/null || echo "starting")
              if [ "$state" = "running" ] || [ "$state" = "degraded" ]; then
                echo "Systemd ready on $host (state: $state)"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "Timeout waiting for systemd on $host"
                docker logs $host 2>&1 || true
                exit 1
              fi
              sleep 2
            done
          done

      - name: Install SSH on containers
        run: |
          for host in seaweed-up-host1 seaweed-up-host2 seaweed-up-host3; do
            echo "Installing SSH on $host..."
            docker exec $host bash -c "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y openssh-server curl netcat-openbsd"
            docker exec $host bash -c "mkdir -p /run/sshd"
            docker exec $host bash -c "sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config"
            docker exec $host bash -c "sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config"
            docker exec $host bash -c "systemctl enable ssh && systemctl start ssh"
          done

          sleep 5
          for ip in 172.28.0.10 172.28.0.11 172.28.0.12; do
            for j in {1..30}; do
              if nc -z $ip 22 2>/dev/null; then
                echo "SSH ready on $ip"
                break
              fi
              if [ $j -eq 30 ]; then
                echo "SSH not ready on $ip"
                exit 1
              fi
              sleep 1
            done
          done

      - name: Setup SSH keys
        run: |
          mkdir -p .ssh
          ssh-keygen -t rsa -b 2048 -f .ssh/id_rsa_test -N "" -q
          PUB_KEY=$(cat .ssh/id_rsa_test.pub)
          for host in seaweed-up-host1 seaweed-up-host2 seaweed-up-host3; do
            docker exec $host bash -c "mkdir -p /root/.ssh && chmod 700 /root/.ssh"
            docker exec $host bash -c "echo '$PUB_KEY' > /root/.ssh/authorized_keys"
            docker exec $host bash -c "chmod 600 /root/.ssh/authorized_keys && chown root:root /root/.ssh/authorized_keys"
          done

      - name: Verify SSH connectivity
        run: |
          for ip in 172.28.0.10 172.28.0.11 172.28.0.12; do
            ssh -i .ssh/id_rsa_test -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 root@$ip "echo 'SSH OK to $ip'"
          done

      - name: Deploy cluster with admin UI
        run: |
          ../../seaweed-up cluster deploy test-admin \
            -f testdata/cluster-admin.yaml \
            -u root \
            --identity .ssh/id_rsa_test \
            --yes

          echo "Waiting for services to initialize..."
          sleep 30

          echo "=== Service status on host1 ==="
          docker exec seaweed-up-host1 systemctl list-units 'seaweed*' --all --no-pager || true
          docker exec seaweed-up-host1 ps aux | grep -v grep | grep weed || true
          docker exec seaweed-up-host1 ss -tlnp || true

      - name: Verify admin UI HTTP endpoint
        run: |
          set -e
          echo "Probing admin UI on 172.28.0.10:23646 ..."
          SUCCESS=0
          for i in $(seq 1 30); do
            BODY=$(curl -sS -o /tmp/admin_body -w "%{http_code}" "http://172.28.0.10:23646/" || echo "000")
            echo "attempt $i: http_code=$BODY"
            if [ "$BODY" = "200" ]; then
              if grep -q "SeaweedFS" /tmp/admin_body; then
                echo "Admin UI responded 200 and body contains SeaweedFS"
                SUCCESS=1
                break
              else
                echo "Got 200 but body lacks SeaweedFS:"
                head -c 400 /tmp/admin_body || true
              fi
            fi
            sleep 3
          done
          if [ "$SUCCESS" -ne 1 ]; then
            echo "=== admin journal ==="
            docker exec seaweed-up-host1 journalctl -u 'seaweed_admin*' --no-pager -n 100 || true
            echo "=== admin log files ==="
            docker exec seaweed-up-host1 bash -c "cat /opt/seaweed/admin*/*.log 2>/dev/null || true"
            exit 1
          fi

      - name: Save logs
        if: always()
        run: |
          echo "=== Container Status ===" > admin-ui.log
          docker ps -a >> admin-ui.log
          for host in seaweed-up-host1 seaweed-up-host2 seaweed-up-host3; do
            echo "=== Logs for $host ===" >> admin-ui.log
            docker logs $host >> admin-ui.log 2>&1 || true
            echo "=== seaweed journal for $host ===" >> admin-ui.log
            docker exec $host journalctl -u 'seaweed*' --no-pager -n 200 >> admin-ui.log 2>&1 || true
          done

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: admin-ui-test-logs
          path: test/integration/admin-ui.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker stop seaweed-up-host1 seaweed-up-host2 seaweed-up-host3 || true
          docker rm seaweed-up-host1 seaweed-up-host2 seaweed-up-host3 || true
          docker network rm seaweed-up-net || true
          rm -rf .ssh
