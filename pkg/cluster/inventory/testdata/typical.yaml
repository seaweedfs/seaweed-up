defaults:
  ssh:
    user: ubuntu
    port: 22
    identity: ~/.ssh/id_rsa
  disk:
    device_globs: ["/dev/sd*", "/dev/nvme*"]
    exclude: ["/dev/sda"]
    reserve_pct: 5
    disk_type_auto: true

hosts:
  - ip: 10.0.0.11
    roles: [master, filer]
    labels: { zone: a, rack: r1 }

  - ip: 10.0.0.12
    roles: [master, filer]
    labels: { zone: b, rack: r2 }

  - ip: 10.0.0.13
    roles: [master]

  - ip: 10.0.0.21
    roles: [volume]
    ssh: { user: deploy }
    labels: { zone: a, rack: r1 }

  - ip: 10.0.0.71
    roles: [admin, worker]

  - ip: 10.0.0.41
    roles: [external]
    tag: postgres-metadata
