defaults:
  ssh:
    user: ubuntu
    port: 22
  disk:
    disk_type_auto: true
    reserve_pct: 5

hosts:
  # Masters + filers colocated.
  - ip: 10.0.0.11
    roles: [master, filer]
    labels: { zone: a, rack: r1 }

  - ip: 10.0.0.12
    roles: [master, filer]
    labels: { zone: b, rack: r2 }

  - ip: 10.0.0.13
    roles: [master, filer]
    labels: { zone: c, rack: r3 }

  # Dedicated volume servers.
  - ip: 10.0.0.21
    roles: [volume]
    labels: { zone: a, rack: r1 }

  - ip: 10.0.0.22
    roles: [volume]
    labels: { zone: b, rack: r2 }

  - ip: 10.0.0.23
    roles: [volume]
    labels: { zone: c, rack: r3 }
